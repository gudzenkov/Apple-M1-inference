version: '3.8'

services:
  mlx-optiq-server:
    build:
      context: ./src/mlx-openai-optiq-server
      dockerfile: Dockerfile
    container_name: mlx-optiq-server
    ports:
      - "8080:8080"
    environment:
      - HUGGINGFACE_MODEL=mlx-community/Qwen3.5-9B-OptiQ-4bit
      - CONTEXT_LENGTH=262144
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      # Cache models and HF data between runs
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped
    # MLX requires Apple Silicon GPU access
    # Only works on macOS with Docker Desktop
    platform: linux/arm64

volumes:
  hf-cache:
    name: mlx-huggingface-cache
